<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <title>AI Office — Sign in</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(1000px 600px at 20% 10%, rgba(6,182,212,0.10), transparent 60%),
          radial-gradient(900px 600px at 80% 90%, rgba(139,92,246,0.10), transparent 60%),
          #020617;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 16px;
        padding: 32px 28px 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .logo-mark {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #06b6d4, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-text { font-weight: 700; font-size: 16px; }
      .logo-sub  { font-size: 11px; color: #64748b; }
      h1 {
        font-size: 18px;
        margin: 0 0 6px;
        font-weight: 600;
      }
      p.lead {
        margin: 0 0 22px;
        color: #94a3b8;
        font-size: 13px;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 12px;
        color: #cbd5e1;
        margin-bottom: 6px;
        font-weight: 500;
      }
      input[type="password"] {
        width: 100%;
        padding: 11px 13px;
        background: rgba(2, 6, 23, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.20);
        border-radius: 10px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input[type="password"]:focus {
        border-color: rgba(6, 182, 212, 0.6);
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
      }
      button {
        width: 100%;
        margin-top: 16px;
        padding: 11px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #06b6d4, #8b5cf6);
        color: white;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        font-family: inherit;
        transition: opacity 0.15s, transform 0.05s;
      }
      button:hover:not(:disabled) { opacity: 0.92; }
      button:active:not(:disabled) { transform: translateY(1px); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .error {
        margin-top: 12px;
        padding: 10px 12px;
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 8px;
        color: #fca5a5;
        font-size: 13px;
        display: none;
      }
      .error.show { display: block; }
      .footnote {
        margin-top: 20px;
        font-size: 11px;
        color: #64748b;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <form class="card" id="login-form" autocomplete="off">
      <div class="logo">
        <div class="logo-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="logo-text">AI Office</div>
          <div class="logo-sub">Virtual Workspace</div>
        </div>
      </div>

      <h1>Sign in</h1>
      <p class="lead">This workspace is private. Enter the access password to continue.</p>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required autofocus />

      <button type="submit" id="submit">Sign in</button>

      <div class="error" id="error" role="alert"></div>

      <div class="footnote">FatCat Analytics</div>
    </form>

    <script>
      (function () {
        var form = document.getElementById("login-form");
        var input = document.getElementById("password");
        var btn = document.getElementById("submit");
        var err = document.getElementById("error");

        function showError(msg) {
          err.textContent = msg;
          err.classList.add("show");
        }
        function clearError() {
          err.textContent = "";
          err.classList.remove("show");
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          clearError();
          btn.disabled = true;
          var originalLabel = btn.textContent;
          btn.textContent = "Signing in…";
          try {
            var res = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password: input.value }),
              credentials: "same-origin",
            });
            if (res.ok) {
              // Cookie is set; bounce to the app.
              window.location.replace("/");
              return;
            }
            var data = {};
            try { data = await res.json(); } catch (_) { /* non-JSON */ }
            if (res.status === 429) {
              showError(data.message || "Too many attempts. Wait a minute and try again.");
            } else if (res.status === 401) {
              showError(data.message || "Wrong password.");
              input.select();
            } else {
              showError(data.message || ("Sign in failed (" + res.status + ")."));
            }
          } catch (e) {
            showError("Network error. Try again.");
          } finally {
            btn.disabled = false;
            btn.textContent = originalLabel;
          }
        });
      })();
    </script>
  </body>
</html>
